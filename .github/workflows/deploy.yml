name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  REPO_LOWER: daniillepekhin/telegram-webapp

jobs:
  # ── TypeCheck + Build webapp ──────────────────────────────────────────────
  typecheck:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.1'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check backend
        run: pnpm --filter @showcase/backend typecheck

      - name: Type-check bot
        run: pnpm --filter @showcase/bot typecheck

      - name: Build webapp (smoke test)
        run: pnpm --filter @showcase/webapp build
        env:
          NEXT_PUBLIC_API_URL: https://myapp.daniillepekhin.com
          NEXT_PUBLIC_BOT_USERNAME: myapp_showcase_bot

  # ── Build & Push Docker images ────────────────────────────────────────────
  build:
    name: Build ${{ matrix.app }}
    needs: typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: backend
            image: telegram-webapp-backend
          - app: bot
            image: telegram-webapp-bot
          - app: webapp
            image: telegram-webapp-webapp

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}-${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}-${{ matrix.app }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://myapp.daniillepekhin.com
            NEXT_PUBLIC_BOT_USERNAME=myapp_showcase_bot
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max

  # ── Deploy to VPS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e
            cd /var/www/myapp

            # Login to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u daniillepekhin --password-stdin

            # Pull новые образы
            docker compose pull

            # Остановить текущие контейнеры перед обновлением (избегаем конфликт портов)
            docker compose down --remove-orphans || true

            # Запустить обновлённые контейнеры (--wait даёт compose время дождаться healthchecks)
            docker compose up -d --wait --wait-timeout 120 || {
              echo "=== docker compose up failed, dumping backend logs ==="
              docker compose logs --tail=50 myapp-backend 2>/dev/null || docker compose logs --tail=50 backend 2>/dev/null || true
              echo "=== docker compose ps ==="
              docker compose ps -a
              exit 1
            }

            # Применить DB миграции
            sleep 5
            docker compose exec -T myapp-backend bun dist/migrate.js 2>/dev/null || docker compose exec -T backend bun dist/migrate.js 2>/dev/null || echo "Migration skipped or pending"

            # Зарегистрировать Telegram webhook
            sleep 5
            BOT_TOKEN=$(grep TELEGRAM_BOT_TOKEN .env | cut -d= -f2)
            WEBHOOK_SECRET=$(grep TELEGRAM_WEBHOOK_SECRET .env | cut -d= -f2)
            curl -s "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
              -d "url=https://myapp.daniillepekhin.com/bot/webhook" \
              -d "secret_token=${WEBHOOK_SECRET}" \
              -d "allowed_updates=[\"message\",\"callback_query\",\"my_chat_member\"]" \
              -d "drop_pending_updates=false" | grep -q '"ok":true' && echo " webhook OK" || echo " webhook FAILED"

            # Health checks (не блокируем pipeline если ещё стартует)
            curl -sf http://localhost:3102/health && echo " backend OK" || echo " backend starting..."
            curl -sf -o /dev/null http://localhost:3004 && echo " webapp OK" || echo " webapp starting..."

            # Cleanup старых слоёв
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

  # ── Smoke tests ───────────────────────────────────────────────────────────
  smoke:
    name: Smoke Tests
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Wait for services to be ready
        run: sleep 20

      - name: Health check — backend
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://myapp.daniillepekhin.com/health)
          echo "Health status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "FAIL: /health returned $STATUS" && exit 1)

      - name: Smoke — public scenarios list
        run: |
          BODY=$(curl -sf https://myapp.daniillepekhin.com/api/v1/showcase/scenarios)
          echo "$BODY" | grep -q '"success":true' || (echo "FAIL: /showcase/scenarios" && exit 1)
          echo "OK: scenarios"

      - name: Smoke — public achievements list
        run: |
          BODY=$(curl -sf https://myapp.daniillepekhin.com/api/v1/gamification/achievements)
          echo "$BODY" | grep -q '"success":true' || (echo "FAIL: /gamification/achievements" && exit 1)
          echo "OK: achievements"

      - name: Smoke — public plans list
        run: |
          BODY=$(curl -sf https://myapp.daniillepekhin.com/api/v1/subscriptions/plans)
          echo "$BODY" | grep -q '"success":true' || (echo "FAIL: /subscriptions/plans" && exit 1)
          echo "OK: plans"

      - name: Smoke — webapp responds
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://myapp.daniillepekhin.com)
          echo "Webapp status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "FAIL: webapp returned $STATUS" && exit 1)
