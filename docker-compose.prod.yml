version: '3.9'

# ─── Production Docker Compose ─────────────────────────────────────────────────
# Deploy: docker compose -f docker-compose.prod.yml up -d
# Images are pulled from GHCR (built by CI)

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

x-restart: &restart-policy
  restart: unless-stopped

services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: *restart-policy
    logging: *default-logging
    environment:
      POSTGRES_DB: showcase
      POSTGRES_USER: ${POSTGRES_USER:-showcase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-showcase}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7.4-alpine
    <<: *restart-policy
    logging: *default-logging
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required in production}
    volumes:
      - redis_data:/data
    healthcheck:
      # Use --no-auth-warning and pass the password so healthcheck works when auth is enabled
      test: ['CMD-SHELL', 'redis-cli -a ${REDIS_PASSWORD} ping | grep -c PONG']
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  # ─── Application ────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/daniillepekhin/telegram-webapp-backend:latest
    <<: *restart-policy
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: '3100'
      HOST: '0.0.0.0'
      DATABASE_URL: postgresql://${POSTGRES_USER:-showcase}:${POSTGRES_PASSWORD}@postgres:5432/showcase
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:?TELEGRAM_WEBHOOK_SECRET is required in production}
      WEBAPP_URL: ${WEBAPP_URL:?WEBAPP_URL is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      ENABLE_AI: ${ENABLE_AI:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3100/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks: [internal]

  bot:
    image: ghcr.io/daniillepekhin/telegram-webapp-bot:latest
    <<: *restart-policy
    logging: *default-logging
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-showcase}:${POSTGRES_PASSWORD}@postgres:5432/showcase
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:?TELEGRAM_WEBHOOK_SECRET is required in production}
      WEBAPP_URL: ${WEBAPP_URL:?WEBAPP_URL is required}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:${BOT_WEBHOOK_PORT:-3200}/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks: [internal]

  webapp:
    image: ghcr.io/daniillepekhin/telegram-webapp-webapp:latest
    <<: *restart-policy
    logging: *default-logging
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${WEBAPP_URL}/api
      NEXT_PUBLIC_BOT_USERNAME: ${BOT_USERNAME:-showcase_bot}
    depends_on:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks: [internal]

  # ─── Reverse proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    <<: *restart-policy
    logging: *default-logging
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - webapp
      - backend
    networks: [internal, public]

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Run manually: docker compose run certbot certonly --webroot ...
    profiles: [certbot]

  # ─── Monitoring ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    <<: *restart-policy
    logging: *default-logging
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    profiles: [monitoring]
    networks: [internal]

  grafana:
    image: grafana/grafana:10.4.2
    <<: *restart-policy
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required for monitoring}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: ${WEBAPP_URL}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: 'true'
      GF_DATASOURCES_DEFAULT_URL: http://prometheus:9090
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles: [monitoring]
    networks: [internal]

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:
  prometheus_data:
  grafana_data:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
